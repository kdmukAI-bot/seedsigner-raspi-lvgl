# Secondary mirror CI (GitHub Actions is authoritative). Runs the same
# ./run_build.sh entry as GitHub and local dev so there is one build path to
# maintain; run_build.sh's named Docker volumes give the native runner
# persistent ccache/venv across runs.
name: build

on:
  push:
    branches: [ main ]
    paths:
      - '.forgejo/workflows/build.yml'
      - 'run_build.sh'
      - 'docker/**'
      - 'scripts/ci-preflight.sh'
      - 'setup.py'
      - 'pyproject.toml'
      - 'versions.lock.toml'
      - 'native/**'
      - 'tests/**'
      - 'sources/seedsigner-lvgl-screens'  # submodule pointer bump (new screens)
      - 'sources/cUR'                      # submodule pointer bump (native cUR/uUR)
  pull_request:
    paths:
      - '.forgejo/workflows/build.yml'
      - 'run_build.sh'
      - 'docker/**'
      - 'scripts/ci-preflight.sh'
      - 'setup.py'
      - 'pyproject.toml'
      - 'versions.lock.toml'
      - 'native/**'
      - 'tests/**'
      - 'sources/seedsigner-lvgl-screens'  # submodule pointer bump (new screens)
      - 'sources/cUR'                      # submodule pointer bump (native cUR/uUR)

jobs:
  build-armv6:
    runs-on: native
    env:
      PY_SERIES: py310-dev
      IMAGE_TAG: ghcr.io/kdmukai-bot/seedsigner-raspi-lvgl/python-armv6:py310-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU binfmt
        run: docker run --privileged --rm tonistiigi/binfmt --install arm >/dev/null

      - name: Preflight dependency check
        run: bash scripts/ci-preflight.sh

      - name: Pull base image
        run: docker pull --platform linux/arm/v6 "${IMAGE_TAG}"

      - name: Build ARMv6 extension
        run: WS_ROOT="${GITHUB_WORKSPACE}" ./run_build.sh

      - name: Verify artifacts
        run: ls -la src/seedsigner_lvgl_screens*.so src/uUR*.so

      # Forgejo artifact upload is best-effort; not all instances support it.
      - name: Upload extension artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-${{ env.PY_SERIES }}
          path: |
            src/seedsigner_lvgl_screens*.so
            src/uUR*.so

      - name: Upload build logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-logs
          path: logs/

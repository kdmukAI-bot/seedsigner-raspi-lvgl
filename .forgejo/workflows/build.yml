# Secondary mirror CI (GitHub Actions is authoritative). Runs the same
# ./run_build.sh entry as GitHub and local dev so there is one build path to
# maintain; run_build.sh's named Docker volume gives the native runner a
# persistent ccache across runs.
name: build

on:
  push:
    branches: [ main ]
    paths:
      - '.forgejo/workflows/build.yml'
      - 'run_build.sh'
      - 'docker/**'
      - 'scripts/ci-preflight.sh'
      - 'setup.py'
      - 'pyproject.toml'
      - 'versions.lock.toml'
      - 'native/**'
      - 'tests/**'
      - 'sources/seedsigner-lvgl-screens'  # submodule pointer bump (new screens)
      - 'sources/cUR'                      # submodule pointer bump (native cUR/uUR)
  pull_request:
    paths:
      - '.forgejo/workflows/build.yml'
      - 'run_build.sh'
      - 'docker/**'
      - 'scripts/ci-preflight.sh'
      - 'setup.py'
      - 'pyproject.toml'
      - 'versions.lock.toml'
      - 'native/**'
      - 'tests/**'
      - 'sources/seedsigner-lvgl-screens'  # submodule pointer bump (new screens)
      - 'sources/cUR'                      # submodule pointer bump (native cUR/uUR)

jobs:
  build-armv6:
    runs-on: native
    env:
      # ARMv6 cross-compile SDK (SeedSigner OS buildroot toolchain + target
      # sysroot). Cross-compiles natively on x86 -- no QEMU/binfmt needed.
      IMAGE_TAG: ghcr.io/kdmukai-bot/seedsigner-raspi-lvgl/sdk-armv6:ss-os-0.8.0-81-gbfbd791
      SDK_KEY: ss-os-0.8.0-81-gbfbd791
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Preflight dependency check
        run: bash scripts/ci-preflight.sh

      - name: Pull cross-compile SDK image
        run: docker pull "${IMAGE_TAG}"

      - name: Cross-compile ARMv6 extensions
        run: WS_ROOT="${GITHUB_WORKSPACE}" ./run_build.sh

      - name: Verify artifacts
        run: ls -la src/seedsigner_lvgl_screens*.so src/uUR*.so

      # Forgejo artifact upload is best-effort; not all instances support it.
      - name: Upload extension artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-${{ env.SDK_KEY }}
          path: |
            src/seedsigner_lvgl_screens*.so
            src/uUR*.so

      - name: Upload build logs
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-logs
          path: logs/

# Secondary mirror CI (GitHub Actions is authoritative). GitLab dind cannot
# volume-mount the job workspace into the build container, so this is the one
# config that cannot reuse ./run_build.sh — it reproduces the same
# docker/build_steps.sh invocation via docker create/cp/start.
stages:
  - build

build-armv6:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    GIT_SUBMODULE_STRATEGY: recursive
    IMAGE_TAG: ghcr.io/kdmukai-bot/seedsigner-raspi-lvgl/python-armv6:py310-dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - .gitlab-ci.yml
        - run_build.sh
        - docker/**/*
        - scripts/ci-preflight.sh
        - setup.py
        - pyproject.toml
        - versions.lock.toml
        - native/**/*
        - tests/**/*
        - sources/seedsigner-lvgl-screens
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    # Register QEMU binfmt for ARM emulation on x86 runners.
    - docker run --privileged --rm tonistiigi/binfmt --install arm >/dev/null
  script:
    - |
      set -euo pipefail

      bash scripts/ci-preflight.sh

      docker pull --platform linux/arm/v6 "${IMAGE_TAG}"

      # GitLab DinD: the Docker daemon runs in a separate container, so volume
      # mounts from the job container are not visible.  Use docker cp instead.
      CONTAINER_REPO_DIR="/workspace"
      BUILD_CONTAINER="armv6-build-$$"

      mkdir -p logs src

      docker create --name "${BUILD_CONTAINER}" \
        --platform linux/arm/v6 \
        -w "${CONTAINER_REPO_DIR}" \
        "${IMAGE_TAG}" \
        bash ./docker/build_steps.sh

      # Copy workspace into the build container.
      docker cp . "${BUILD_CONTAINER}:${CONTAINER_REPO_DIR}"

      # Run the build; keep the log and the container alive long enough to
      # collect artifacts even on failure (artifacts: when: always).
      BUILD_RC=0
      docker start -a "${BUILD_CONTAINER}" 2>&1 | tee "logs/$(date -u +%Y%m%d-%H%M%S)_build.log" || BUILD_RC=$?

      if [ "${BUILD_RC}" -eq 0 ]; then
        docker cp "${BUILD_CONTAINER}:${CONTAINER_REPO_DIR}/src/." ./src/
      fi
      docker rm "${BUILD_CONTAINER}" || true

      [ "${BUILD_RC}" -eq 0 ] || exit "${BUILD_RC}"

      # Verify artifact exists.
      ls -la src/seedsigner_lvgl_screens*.so
  artifacts:
    when: always
    paths:
      - src/seedsigner_lvgl_screens*.so
      - logs/
    expire_in: 30 days

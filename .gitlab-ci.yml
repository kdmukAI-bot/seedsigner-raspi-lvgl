stages:
  - build

build-armv6:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2375
    # Build configuration
    BUILD_PROFILE: dev
    PY_SERIES: py310-dev
    IMAGE_TAG: registry.gitlab.com/kdmukai-bot/seedsigner-raspi-lvgl/python-armv6:py310-dev
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - .gitlab-ci.yml
        - run_build.sh
        - docker/build_steps.sh
        - setup.py
        - versions.lock.toml
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    # Register QEMU binfmt for ARM emulation on x86 runners.
    - docker run --privileged --rm tonistiigi/binfmt --install arm >/dev/null
  script:
    - |
      set -euo pipefail

      # Preflight: verify submodule sources are present.
      test -f sources/seedsigner-c-modules/components/seedsigner/seedsigner.cpp
      test -f sources/seedsigner-c-modules/third_party/lvgl/lvgl.h

      docker pull --platform linux/arm/v6 "${IMAGE_TAG}"

      # Run the build inside the ARM container.
      # Mount the full workspace so run_build.sh can resolve relative paths.
      WS_ROOT="$(pwd)"
      CONTAINER_REPO_DIR="/workspace"

      mkdir -p logs .ci-ccache

      docker run --rm --platform linux/arm/v6 \
        -v "${WS_ROOT}:${CONTAINER_REPO_DIR}" \
        -v "${WS_ROOT}/.ci-ccache:/root/.cache/ccache" \
        -w "${CONTAINER_REPO_DIR}" \
        -e RUN_TS="$(date -u +%Y%m%d-%H%M%S)" \
        -e ABI_JSON="${CONTAINER_REPO_DIR}/docs/abi/dev-pi-abi.json" \
        -e LOCK_FILE="${CONTAINER_REPO_DIR}/versions.lock.toml" \
        -e SEEDSIGNER_C_MODULES_DIR="${CONTAINER_REPO_DIR}/sources/seedsigner-c-modules" \
        -e LVGL_ROOT="${CONTAINER_REPO_DIR}/sources/seedsigner-c-modules/third_party/lvgl" \
        -e LVGL_PERF_MONITOR=0 \
        "${IMAGE_TAG}" \
        bash ./docker/build_steps.sh

      # Verify artifact exists.
      ls -la src/seedsigner_lvgl_native*.so
  artifacts:
    paths:
      - src/seedsigner_lvgl_native*.so
      - logs/
    expire_in: 30 days
  cache:
    key: ccache-${PY_SERIES}
    paths:
      - .ci-ccache/

name: build

# Read-only: the workflow only pulls the GHCR base image and uploads run-local
# artifacts; nothing writes to the repo or packages.
permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build.yml'
      - 'run_build.sh'
      - 'docker/**'
      - 'scripts/ci-preflight.sh'
      - 'setup.py'
      - 'pyproject.toml'
      - 'versions.lock.toml'
      - 'native/**'
      - 'tests/**'
      - 'sources/seedsigner-lvgl-screens'  # submodule pointer bump (new screens)
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'run_build.sh'
      - 'docker/**'
      - 'scripts/ci-preflight.sh'
      - 'setup.py'
      - 'pyproject.toml'
      - 'versions.lock.toml'
      - 'native/**'
      - 'tests/**'
      - 'sources/seedsigner-lvgl-screens'  # submodule pointer bump (new screens)

env:
  PY_SERIES: py310-dev
  # Bot-hosted public base image: kdmukai-bot has the GHCR package-create perms
  # the kdmukai personal account lacks, so every context (upstream pushes,
  # bot-fork pushes, fork PRs) pulls this one public tag.
  IMAGE_TAG: ghcr.io/kdmukai-bot/seedsigner-raspi-lvgl/python-armv6:py310-dev

jobs:
  build-armv6:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout seedsigner-raspi-lvgl
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Preflight dependency path check
        run: bash scripts/ci-preflight.sh

      - name: Pull base image
        run: docker pull --platform linux/arm/v6 "${IMAGE_TAG}"

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ci-ccache
          key: ccache-build-${{ env.PY_SERIES }}-${{ hashFiles('setup.py', 'versions.lock.toml') }}
          restore-keys: |
            ccache-build-${{ env.PY_SERIES }}-

      - name: Build ARMv6 extension
        env:
          WS_ROOT: ${{ github.workspace }}
          PLATFORM: linux/arm/v6
          CCACHE_HOST_DIR: ${{ github.workspace }}/.ci-ccache
        run: |
          mkdir -p "${CCACHE_HOST_DIR}"
          ./run_build.sh

      - name: Locate built extension
        id: art
        shell: bash
        run: |
          set -euo pipefail
          ART="$(ls -1 ${GITHUB_WORKSPACE}/src/seedsigner_lvgl_screens*.so | head -n1)"
          echo "artifact=${ART}" >> "$GITHUB_OUTPUT"
          echo "artifact_basename=$(basename "$ART")" >> "$GITHUB_OUTPUT"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ env.PY_SERIES }}-${{ github.sha }}
          path: ${{ steps.art.outputs.artifact }}
          if-no-files-found: error

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-${{ github.run_id }}
          path: ${{ github.workspace }}/logs/
          if-no-files-found: error

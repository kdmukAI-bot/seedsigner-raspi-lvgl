name: build

# Read-only: the workflow only pulls the public SDK image and uploads run-local
# artifacts; nothing writes to the repo or packages.
permissions:
  contents: read
  packages: read

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build.yml'
      - 'run_build.sh'
      - 'docker/**'
      - 'scripts/ci-preflight.sh'
      - 'setup.py'
      - 'pyproject.toml'
      - 'versions.lock.toml'
      - 'native/**'
      - 'tests/**'
      - 'sources/seedsigner-lvgl-screens'  # submodule pointer bump (new screens)
      - 'sources/cUR'                      # submodule pointer bump (native cUR/uUR)
  pull_request:
    paths:
      - '.github/workflows/build.yml'
      - 'run_build.sh'
      - 'docker/**'
      - 'scripts/ci-preflight.sh'
      - 'setup.py'
      - 'pyproject.toml'
      - 'versions.lock.toml'
      - 'native/**'
      - 'tests/**'
      - 'sources/seedsigner-lvgl-screens'  # submodule pointer bump (new screens)
      - 'sources/cUR'                      # submodule pointer bump (native cUR/uUR)

env:
  # ARMv6 cross-compile SDK: the SeedSigner OS buildroot toolchain + the matching
  # target sysroot (libcamera, zbar, Python 3.12 headers, glibc 2.40, libstdc++).
  # The tag names the OS release the sysroot came from -- bumping the OS means
  # rebuilding the SDK (docker/build_sdk_image.sh) and moving this tag together.
  # Bot-hosted public image: kdmukai-bot has the GHCR package-create perms the
  # kdmukai personal account lacks, so every context (upstream pushes, bot-fork
  # pushes, fork PRs) pulls this one public tag.
  IMAGE_TAG: ghcr.io/kdmukai-bot/seedsigner-raspi-lvgl/sdk-armv6:ss-os-0.8.0-81-gbfbd791
  SDK_KEY: ss-os-0.8.0-81-gbfbd791

jobs:
  build-armv6:
    runs-on: ubuntu-latest
    # Cross-compiles natively on x86 (no QEMU), so the build is minutes, not the
    # ~90 the emulated ARMv6 path needed.
    timeout-minutes: 30
    steps:
      - name: Checkout seedsigner-raspi-lvgl
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          submodules: recursive

      - name: Preflight dependency path check
        run: bash scripts/ci-preflight.sh

      - name: Pull cross-compile SDK image
        run: docker pull "${IMAGE_TAG}"

      - name: Restore ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ github.workspace }}/.ci-ccache
          # Unique per-run key: actions/cache skips the post-job save on an
          # exact primary-key hit, which would freeze the cache forever after
          # its first save. A fresh key each run always saves the updated
          # cache; restore-keys pulls the newest prior one. Keyed on the SDK so
          # a toolchain change starts a clean cache rather than reusing objects
          # built by a different compiler.
          key: ccache-build-${{ env.SDK_KEY }}-${{ github.run_id }}
          restore-keys: |
            ccache-build-${{ env.SDK_KEY }}-

      - name: Cross-compile ARMv6 extensions
        env:
          WS_ROOT: ${{ github.workspace }}
          CCACHE_HOST_DIR: ${{ github.workspace }}/.ci-ccache
        run: |
          mkdir -p "${CCACHE_HOST_DIR}"
          ./run_build.sh

      - name: Locate built extensions
        id: art
        shell: bash
        run: |
          set -euo pipefail
          # `ls | head` under pipefail fails the step if either glob is empty,
          # so both extensions must have been built.
          ART="$(ls -1 ${GITHUB_WORKSPACE}/src/seedsigner_lvgl_screens*.so | head -n1)"
          UUR="$(ls -1 ${GITHUB_WORKSPACE}/src/uUR*.so | head -n1)"
          echo "artifact=${ART}" >> "$GITHUB_OUTPUT"
          echo "uur=${UUR}" >> "$GITHUB_OUTPUT"

      - name: Upload extension artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: build-${{ env.SDK_KEY }}-${{ github.sha }}
          path: |
            ${{ steps.art.outputs.artifact }}
            ${{ steps.art.outputs.uur }}
          if-no-files-found: error

      - name: Upload build logs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: build-logs-${{ github.run_id }}
          path: ${{ github.workspace }}/logs/
          if-no-files-found: error

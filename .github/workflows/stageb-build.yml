name: stageb-build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-screen-core-sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout seedsigner-raspi-lvgl
        uses: actions/checkout@v4
        with:
          path: seedsigner-raspi-lvgl

      - name: Checkout seedsigner-micropython-builder (source dependency)
        uses: actions/checkout@v4
        with:
          repository: kdmukAI-bot/seedsigner-micropython-builder
          path: seedsigner-micropython-builder

      - name: Build via shared Docker entrypoint
        working-directory: seedsigner-raspi-lvgl
        env:
          WS_ROOT: ${{ github.workspace }}
          SEEDSIGNER_C_MODULES_DIR: /workspace/seedsigner-micropython-builder/sources/seedsigner-c-modules
        run: |
          ./scripts/build_in_docker.sh

      - name: Upload stageb artifact
        uses: actions/upload-artifact@v4
        with:
          name: screen_core_sanity
          path: seedsigner-raspi-lvgl/build/stageb-screen-core/screen_core_sanity
          if-no-files-found: error

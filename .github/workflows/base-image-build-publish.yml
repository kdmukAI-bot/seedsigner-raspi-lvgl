name: base-image-build-publish

on:
  workflow_dispatch:
    inputs:
      python_major:
        description: "Python major/minor line to target"
        required: true
        type: choice
        options:
          - "3.10"
          - "3.11"
          - "3.12"
        default: "3.10"
      push:
        description: "Push built image to GHCR"
        required: true
        type: boolean
        default: true
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/base-image-build-publish.yml'
      - 'docker/Dockerfile.python-armv6-base'
      - 'scripts/build_python_armv6_base_in_docker.sh'
      - 'versions.lock.toml'

permissions:
  contents: read
  packages: write

jobs:
  build-publish-armv6-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build inputs
        id: cfg
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            PY_MAJOR='${{ github.event.inputs.python_major }}'
            DO_PUSH='${{ github.event.inputs.push }}'
          else
            PY_MAJOR='3.10'
            DO_PUSH='false'
          fi

          case "${PY_MAJOR}" in
            3.10)
              PY_VERSION='3.10.10'
              PY_SERIES='py310'
              EXPECTED_SOABI='cpython-310-arm-linux-gnueabihf'
              ;;
            3.11)
              PY_VERSION='3.11.9'
              PY_SERIES='py311'
              EXPECTED_SOABI='cpython-311-arm-linux-gnueabihf'
              ;;
            3.12)
              PY_VERSION='3.12.3'
              PY_SERIES='py312'
              EXPECTED_SOABI='cpython-312-arm-linux-gnueabihf'
              ;;
            *)
              echo "Unsupported python_major: ${PY_MAJOR}" >&2
              exit 2
              ;;
          esac

          echo "python_major=${PY_MAJOR}" >> "$GITHUB_OUTPUT"
          echo "python_version=${PY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "py_series=${PY_SERIES}" >> "$GITHUB_OUTPUT"
          echo "expected_soabi=${EXPECTED_SOABI}" >> "$GITHUB_OUTPUT"
          echo "do_push=${DO_PUSH}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.cfg.outputs.do_push == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          BASE="ghcr.io/kdmukai/seedsigner-raspi-lvgl/python-armv6"
          TAG_SERIES="${BASE}:${{ steps.cfg.outputs.py_series }}"
          TAG_SHA="${BASE}:${{ steps.cfg.outputs.py_series }}-${GITHUB_SHA}"
          echo "tag_series=${TAG_SERIES}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.python-armv6-base
          platforms: linux/arm/v6
          push: ${{ steps.cfg.outputs.do_push == 'true' }}
          tags: |
            ${{ steps.tags.outputs.tag_series }}
            ${{ steps.tags.outputs.tag_sha }}
          build-args: |
            PYTHON_VERSION=${{ steps.cfg.outputs.python_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build local smoke image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.python-armv6-base
          platforms: linux/arm/v6
          push: false
          load: true
          tags: local/stagef-armv6-smoke:${{ github.run_id }}
          build-args: |
            PYTHON_VERSION=${{ steps.cfg.outputs.python_version }}

      - name: Smoke run (QEMU armv6)
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="local/stagef-armv6-smoke:${{ github.run_id }}"
          docker run --rm --platform linux/arm/v6 "$IMAGE" \
            python3 - <<'PY' > abi-smoke.json
import json
import platform
import sysconfig

out = {
  "platform_machine": platform.machine(),
  "python_version": platform.python_version(),
  "soabi": sysconfig.get_config_var("SOABI"),
  "ext_suffix": sysconfig.get_config_var("EXT_SUFFIX"),
}
print(json.dumps(out, indent=2, sort_keys=True))
PY

          cat abi-smoke.json

          python3 - <<'PY'
import json,sys
with open('abi-smoke.json','r',encoding='utf-8') as f:
    d=json.load(f)
machine=(d.get('platform_machine') or '').lower()
soabi=d.get('soabi') or ''
expected='${{ steps.cfg.outputs.expected_soabi }}'
if 'armv6' not in machine:
    print(f"ERROR: expected armv6 machine, got: {machine}")
    sys.exit(2)
if expected not in soabi:
    print(f"ERROR: expected SOABI marker {expected}, got: {soabi}")
    sys.exit(3)
print('ABI smoke checks passed')
PY

      - name: Upload ABI smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: abi-smoke-${{ github.run_id }}
          path: abi-smoke.json

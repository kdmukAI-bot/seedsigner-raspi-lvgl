name: base-image-build-publish

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version to build into armv6 base image"
        required: true
        default: "3.10.10"
      py_series:
        description: "Python ABI series tag"
        required: true
        default: "py310"
      push:
        description: "Push built image to GHCR"
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  build-publish-armv6-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image tags
        id: tags
        run: |
          set -euo pipefail
          BASE="ghcr.io/kdmukai/seedsigner-raspi-lvgl/python-armv6"
          TAG_SERIES="${BASE}:${{ inputs.py_series }}"
          TAG_SHA="${BASE}:${{ inputs.py_series }}-${GITHUB_SHA}"
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"
          echo "tag_series=${TAG_SERIES}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.python-armv6-base
          platforms: linux/arm/v6
          push: ${{ inputs.push }}
          tags: |
            ${{ steps.tags.outputs.tag_series }}
            ${{ steps.tags.outputs.tag_sha }}
          build-args: |
            PYTHON_VERSION=${{ inputs.python_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: false

      - name: Build local smoke image (single-tag, no push required)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.python-armv6-base
          platforms: linux/arm/v6
          push: false
          load: true
          tags: local/stagef-armv6-smoke:${{ github.run_id }}
          build-args: |
            PYTHON_VERSION=${{ inputs.python_version }}

      - name: Smoke run (QEMU armv6)
        id: smoke
        run: |
          set -euo pipefail
          IMAGE="local/stagef-armv6-smoke:${{ github.run_id }}"
          docker run --rm --platform linux/arm/v6 "$IMAGE" \
            python3 - <<'PY' > abi-smoke.json
import json
import platform
import sys
import sysconfig

out = {
  "platform_machine": platform.machine(),
  "python_version": sys.version,
  "soabi": sysconfig.get_config_var("SOABI"),
  "ext_suffix": sysconfig.get_config_var("EXT_SUFFIX"),
}
print(json.dumps(out, indent=2, sort_keys=True))
PY

          cat abi-smoke.json

          python3 - <<'PY'
import json
import sys

with open("abi-smoke.json", "r", encoding="utf-8") as f:
    data = json.load(f)

machine = (data.get("platform_machine") or "").lower()
soabi = data.get("soabi") or ""
py_series = "${{ inputs.py_series }}"

if "armv6" not in machine:
    print(f"ERROR: expected armv6 in machine, got: {machine}")
    sys.exit(2)

if py_series == "py310" and "cpython-310-arm-linux-gnueabihf" not in soabi:
    print(f"ERROR: expected py310 SOABI marker, got: {soabi}")
    sys.exit(3)

print("ABI smoke checks passed")
PY

      - name: Upload ABI smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: abi-smoke-${{ github.run_id }}
          path: abi-smoke.json

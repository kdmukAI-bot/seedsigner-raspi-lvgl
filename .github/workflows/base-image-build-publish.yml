name: base-image-build-publish

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version to bake into ARMv6 base image"
        required: true
        type: choice
        options:
          - "3.10.10"
          - "3.11.9"
          - "3.12.3"
        default: "3.10.10"
      py_series:
        description: "Python ABI series tag"
        required: true
        type: choice
        options:
          - "py310"
          - "py311"
          - "py312"
        default: "py310"
      push:
        description: "Push built image to GHCR"
        required: true
        type: boolean
        default: true
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/base-image-build-publish.yml'
      - 'docker/Dockerfile.python-armv6-base'
      - 'scripts/build_python_armv6_base_in_docker.sh'
      - 'versions.lock.toml'

permissions:
  contents: read
  packages: write

jobs:
  build-publish-armv6-base:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: ${{ inputs.python_version || '3.10.10' }}
      PY_SERIES: ${{ inputs.py_series || 'py310' }}
      DO_PUSH: ${{ inputs.push || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ env.DO_PUSH == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image tags
        id: tags
        run: |
          set -euo pipefail
          BASE="ghcr.io/kdmukai/seedsigner-raspi-lvgl/python-armv6"
          TAG_SERIES="${BASE}:${PY_SERIES}"
          TAG_SHA="${BASE}:${PY_SERIES}-${GITHUB_SHA}"
          echo "tag_series=${TAG_SERIES}" >> "$GITHUB_OUTPUT"
          echo "tag_sha=${TAG_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and (optionally) push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.python-armv6-base
          platforms: linux/arm/v6
          push: ${{ env.DO_PUSH == 'true' }}
          tags: |
            ${{ steps.tags.outputs.tag_series }}
            ${{ steps.tags.outputs.tag_sha }}
          build-args: |
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke run (QEMU armv6)
        run: |
          set -euo pipefail
          IMAGE="${{ steps.tags.outputs.tag_series }}"
          docker pull "$IMAGE" >/dev/null 2>&1 || true
          if ! docker image inspect "$IMAGE" >/dev/null 2>&1; then
            IMAGE="${{ steps.tags.outputs.tag_sha }}"
          fi
          docker run --rm --platform linux/arm/v6 "$IMAGE" \
            python3 - <<'PY' > abi-smoke.json
import json
import platform
import sysconfig

out = {
  "platform_machine": platform.machine(),
  "python_version": platform.python_version(),
  "soabi": sysconfig.get_config_var("SOABI"),
  "ext_suffix": sysconfig.get_config_var("EXT_SUFFIX"),
}
print(json.dumps(out, indent=2, sort_keys=True))
PY

          cat abi-smoke.json

          python3 - <<'PY'
import json
import sys

with open('abi-smoke.json', 'r', encoding='utf-8') as f:
    data = json.load(f)

machine = (data.get('platform_machine') or '').lower()
soabi = data.get('soabi') or ''
py_series = '${{ env.PY_SERIES }}'

if 'armv6' not in machine:
    print(f"ERROR: expected armv6 machine, got: {machine}")
    sys.exit(2)

expected = {
    'py310': 'cpython-310-arm-linux-gnueabihf',
    'py311': 'cpython-311-arm-linux-gnueabihf',
    'py312': 'cpython-312-arm-linux-gnueabihf',
}[py_series]

if expected not in soabi:
    print(f"ERROR: expected SOABI marker {expected}, got: {soabi}")
    sys.exit(3)

print('ABI smoke checks passed')
PY

      - name: Upload ABI smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: abi-smoke-${{ github.run_id }}
          path: abi-smoke.json

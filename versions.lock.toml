# Pin set for the ARMv6 extension build. Consumed by docker/build_steps.sh,
# which validates [target_abi] against the container's Python + the device
# capture (docs/abi/dev-pi-abi.json) and exports [toolchain] as the codegen
# flags setup.py applies (ARMV6_* env).

[target_abi]
python_soabi = "cpython-312-arm-linux-gnueabihf"
python_ext_suffix = ".cpython-312-arm-linux-gnueabihf.so"
# Ceilings for the runtime-compat gates in build_steps.sh. Target = SeedSigner OS
# dev image #114: glibc 2.40, Python 3.12.10, libstdc++.so.6.0.32. The default
# build links the native libcamera engine and therefore SHARED libstdc++, so
# GLIBCXX now appears as an external dep; the ceilings state what the device
# runtime provides (libstdc++.so.6.0.32 -> GLIBCXX_3.4.32).
max_glibc = "GLIBC_2.40"
max_glibcxx = "GLIBCXX_3.4.32"

[toolchain]
arch = "armv6zk"
tune = "arm1176jzf-s"
float_abi = "hard"
fpu = "vfp"

[python]
# Interpreter baked into the py312-dev base image (docker/build_base_image.sh
# PYTHON_VERSION). Device runtime is 3.12.10; only major.minor (3.12) drives SOABI.
py312 = "3.12.3"

[build_tools]
# ccache is baked into the base image; build_steps.sh falls back to plain
# gcc/g++ when absent (slower, still correct).
ccache = "recommended"
